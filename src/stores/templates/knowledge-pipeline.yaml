logic:
  mode: knowledge
  version: '2.0'
  factories:
    - id: research-factory
      machines:
        - id: gather-machine
          nodes:
            - id: input-1
              type: input
              content: "Research topic"
              x: 50
              y: 100
              outputs:
                - ai-gather
            - id: ai-gather
              type: ai
              content: "Gather information"
              x: 350
              y: 100
              inputs:
                - input-1
        - id: analyze-machine
          nodes:
            - id: ai-analyze
              type: ai
              content: "Analyze findings"
              x: 650
              y: 100
              inputs:
                - gather-machine
        - id: synthesize-machine
          nodes:
            - id: ai-synthesize
              type: ai
              content: "Synthesize conclusions"
              x: 950
              y: 100
              inputs:
                - analyze-machine
              outputs:
                - output-1
            - id: output-1
              type: output
              content: "Final Report"
              x: 1250
              y: 100
              inputs:
                - ai-synthesize
