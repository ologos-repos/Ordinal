logic:
  mode: knowledge
  version: '2.0'
  networks:
    - id: new-network
      factories:
        - id: factory-1
          machines:
            - id: f1-machine-1
              nodes:
                - id: f1-m1-input
                  type: input
                  content: "Factory 1 Input"
                  x: 50
                  y: 100
                  outputs:
                    - f1-m1-process
                - id: f1-m1-process
                  type: process
                  content: "Process"
                  x: 300
                  y: 100
                  inputs:
                    - f1-m1-input
            - id: f1-machine-2
              nodes:
                - id: f1-m2-output
                  type: output
                  content: "Factory 1 Output"
                  x: 600
                  y: 100
                  inputs:
                    - f1-machine-1
        - id: factory-2
          machines:
            - id: f2-machine-1
              nodes:
                - id: f2-m1-input
                  type: input
                  content: "Factory 2 Input"
                  x: 50
                  y: 300
                  inputs:
                    - factory-1
                  outputs:
                    - f2-m1-process
                - id: f2-m1-process
                  type: process
                  content: "Process"
                  x: 300
                  y: 300
                  inputs:
                    - f2-m1-input
            - id: f2-machine-2
              nodes:
                - id: f2-m2-output
                  type: output
                  content: "Factory 2 Output"
                  x: 600
                  y: 300
                  inputs:
                    - f2-machine-1
