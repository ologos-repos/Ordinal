logic:
  mode: automation
  version: '2.0'
  machines:
    - id: simple-automation
      nodes:
        - id: input-1
          type: input
          content: "Task input"
          x: 50
          y: 100
          outputs:
            - worker-1
        - id: worker-1
          type: worker
          content: "Process task"
          x: 350
          y: 100
          inputs:
            - input-1
          outputs:
            - output-1
        - id: output-1
          type: output
          content: "Result"
          x: 650
          y: 100
          inputs:
            - worker-1
